<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>JobBot Pro — Sign In</title>
<meta name="description" content="Sign in or create an account to start your AI-powered job search."/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
  .auth-container{width:100%;max-width:440px;position:relative;z-index:1}
  .auth-brand{text-align:center;margin-bottom:40px}
  .auth-brand .brand-mark{width:56px;height:56px;border-radius:16px;font-size:26px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FF6B35,#FF9A5C);box-shadow:0 12px 40px rgba(255,107,53,.3)}
  .auth-brand h1{font-family:var(--syne);font-size:32px;font-weight:800;background:linear-gradient(135deg,#FF9A5C,#EDF2FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .auth-brand p{color:var(--sub);font-size:14px;margin-top:6px}

  .auth-card{background:var(--glass);border:1px solid var(--border2);border-radius:24px;padding:36px 32px;backdrop-filter:blur(20px);box-shadow:0 24px 80px rgba(0,0,0,.5)}

  .auth-tabs{display:flex;gap:4px;background:rgba(0,0,0,.3);border-radius:12px;padding:4px;margin-bottom:32px}
  .auth-tab{flex:1;padding:12px;text-align:center;font-family:var(--jakarta);font-size:14px;font-weight:600;color:var(--sub);border:none;background:transparent;border-radius:9px;cursor:pointer;transition:all .25s var(--ease)}
  .auth-tab.on{background:rgba(255,107,53,.15);color:var(--ember);border:1px solid rgba(255,107,53,.25)}
  .auth-tab:hover:not(.on){color:var(--text);background:rgba(255,255,255,.03)}

  .auth-form{display:none}.auth-form.on{display:block;animation:fadeUp .3s var(--ease)}

  .auth-field{margin-bottom:20px}
  .auth-field label{display:block;font-family:var(--mono);font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .auth-field input{width:100%;padding:14px 16px;background:rgba(0,0,0,.4);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:var(--jakarta);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
  .auth-field input:focus{border-color:var(--ember);box-shadow:0 0 0 3px rgba(255,107,53,.12)}
  .auth-field input::placeholder{color:var(--muted)}

  .auth-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--ember),var(--ember2));border:none;border-radius:13px;color:#fff;font-family:var(--jakarta);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .2s,transform .15s;box-shadow:0 8px 32px rgba(255,107,53,.3);margin-top:28px}
  .auth-btn:hover{opacity:.9;transform:translateY(-1px)}
  .auth-btn:active{transform:scale(.98)}
  .auth-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  .auth-error{display:none;padding:12px 16px;background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);border-radius:10px;color:var(--red);font-size:13px;margin-bottom:18px;line-height:1.5}
  .auth-error.on{display:block;animation:fadeUp .2s var(--ease)}

  .auth-success{display:none;padding:12px 16px;background:rgba(0,217,170,.1);border:1px solid rgba(0,217,170,.25);border-radius:10px;color:var(--teal);font-size:13px;margin-bottom:18px;line-height:1.5}
  .auth-success.on{display:block;animation:fadeUp .2s var(--ease)}

  .auth-divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--muted);font-size:12px}
  .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}

  .auth-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--sub)}
  .auth-footer a{color:var(--ember);text-decoration:none;font-weight:600;cursor:pointer}
  .auth-footer a:hover{text-decoration:underline}

  .pw-strength{height:3px;border-radius:2px;margin-top:8px;background:var(--border);overflow:hidden;transition:all .3s}
  .pw-strength .pw-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}

  .spinner-sm{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body>
<div class="amb"><div class="amb-c a1"></div><div class="amb-c a2"></div><div class="amb-c a3"></div><div class="amb-c a4"></div></div>
<div class="grain"></div>

<div class="auth-container">
  <div class="auth-brand">
    <div class="brand-mark">⚡</div>
    <h1>JobBot Pro</h1>
    <p>AI-powered career command center</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab on" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="authError" class="auth-error"></div>
    <div id="authSuccess" class="auth-success"></div>

    <!-- LOGIN FORM -->
    <form class="auth-form on" id="formLogin" onsubmit="handleLogin(event)">
      <div class="auth-field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="auth-btn" id="loginBtn">
        Sign In
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form class="auth-form" id="formSignup" onsubmit="handleSignup(event)">
      <div class="auth-field">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="John Doe" required autocomplete="name"/>
      </div>
      <div class="auth-field">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="auth-field">
        <label>Password (min 6 characters)</label>
        <input type="password" id="signupPass" placeholder="Create a strong password" required minlength="6" autocomplete="new-password" oninput="checkStrength(this.value)"/>
        <div class="pw-strength"><div class="pw-bar" id="pwBar"></div></div>
      </div>
      <div class="auth-field">
        <label>Confirm Password</label>
        <input type="password" id="signupPass2" placeholder="Re-enter password" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="auth-btn" id="signupBtn">
        Create Account
      </button>
    </form>

    <div class="auth-footer" id="footerLogin">
      Don't have an account? <a onclick="switchTab('signup')">Sign up free</a>
    </div>
    <div class="auth-footer" id="footerSignup" style="display:none">
      Already have an account? <a onclick="switchTab('login')">Sign in</a>
    </div>
  </div>
</div>

<script>
const API = '';

// ── Tab switching ──────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabLogin').className = 'auth-tab' + (tab==='login' ? ' on' : '');
  document.getElementById('tabSignup').className = 'auth-tab' + (tab==='signup' ? ' on' : '');
  document.getElementById('formLogin').className = 'auth-form' + (tab==='login' ? ' on' : '');
  document.getElementById('formSignup').className = 'auth-form' + (tab==='signup' ? ' on' : '');
  document.getElementById('footerLogin').style.display = tab==='login' ? '' : 'none';
  document.getElementById('footerSignup').style.display = tab==='signup' ? '' : 'none';
  clearMessages();
}

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.className = 'auth-error on';
  document.getElementById('authSuccess').className = 'auth-success';
}
function showSuccess(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg; el.className = 'auth-success on';
  document.getElementById('authError').className = 'auth-error';
}
function clearMessages() {
  document.getElementById('authError').className = 'auth-error';
  document.getElementById('authSuccess').className = 'auth-success';
}

// ── Password strength ──────────────────────────────────────────
function checkStrength(pw) {
  const bar = document.getElementById('pwBar');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const pct = (score / 5) * 100;
  const colors = ['#FF4757','#FF4757','#F5C842','#F5C842','#00D9AA','#00D9AA'];
  bar.style.width = pct + '%';
  bar.style.background = colors[score] || '#FF4757';
}

// ── Sign Up ────────────────────────────────────────────────────
async function handleSignup(e) {
  e.preventDefault();
  clearMessages();
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPass').value;
  const pass2 = document.getElementById('signupPass2').value;

  if (pass !== pass2) { showError('Passwords do not match.'); return; }
  if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner-sm"></div> Creating account...';

  try {
    const res = await fetch(API + '/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pass })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    // Store auth token and user info
    localStorage.setItem('jbp_token', data.token);
    localStorage.setItem('jbp_user', JSON.stringify(data.user));

    showSuccess('Account created! Redirecting...');
    setTimeout(() => { window.location.href = '/'; }, 800);
  } catch (err) {
    showError(err.message || 'Signup failed. Try again.');
    btn.disabled = false; btn.innerHTML = 'Create Account';
  }
}

// ── Sign In ────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  clearMessages();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner-sm"></div> Signing in...';

  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    localStorage.setItem('jbp_token', data.token);
    localStorage.setItem('jbp_user', JSON.stringify(data.user));

    showSuccess('Welcome back! Redirecting...');
    setTimeout(() => { window.location.href = '/'; }, 600);
  } catch (err) {
    showError(err.message || 'Login failed. Check your credentials.');
    btn.disabled = false; btn.innerHTML = 'Sign In';
  }
}

// ── Already logged in? Redirect only if token is valid ─────────
(function() {
  const token = localStorage.getItem('jbp_token');
  if (token) {
    try {
      const parts = token.split('.');
      if (parts.length === 3) {
        const payload = JSON.parse(atob(parts[1]));
        if (payload.exp && payload.exp * 1000 > Date.now()) {
          window.location.href = '/';
          return;
        }
      }
    } catch {}
    // Token is invalid or expired — clear it
    localStorage.removeItem('jbp_token');
    localStorage.removeItem('jbp_user');
    localStorage.removeItem('jbp_profile');
  }
})();
</script>
</body>
</html>
