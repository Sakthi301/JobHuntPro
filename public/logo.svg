<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Dynamic gradient for the magnifying glass ring -->
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF512F" />
      <stop offset="40%" stop-color="#F09819" />
      <stop offset="100%" stop-color="#00A8FF" />
    </linearGradient>
    
    <!-- Gradient for the handle bridging blue to orange -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007BFF" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
    
    <!-- Glowing gradient for the inner lightning bolt -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFE000" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
  </defs>
  
  <!-- The handle of the magnifying glass -->
  <line x1="62" y1="62" x2="84" y2="84" stroke="url(#handleGrad)" stroke-width="15" stroke-linecap="round" />
  
  <!-- The outer ring of the magnifying glass -->
  <circle cx="42" cy="42" r="27" fill="#0C0F1A" stroke="url(#ringGrad)" stroke-width="11" />
  
  <!-- The lightning bolt inside -->
  <polygon points="46,22 28,45 40,45 36,63 56,38 43,38" fill="url(#boltGrad)" />
</svg>
